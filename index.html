<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Newsreader:ital,opsz@1,6..72&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #e6e3dd; }
    button { font-family: inherit; border: none; background: none; padding: 0; margin: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ===== Constants =====
    const ACCENT = { color: '#5f8c6e', bg: '#eef3ee' };
    const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const FULL_DAY_NAMES = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const STORAGE_KEY = 'habit-tracker-v1';

    const HABITS_DEF = [
      { id: 'dough',   name: 'No dough (max 1×/wk)',  target: 6 },
      { id: 'sweets',  name: 'No sweets',              target: 7 },
      { id: 'fast',    name: 'Fasting 20:30–12:30',    target: 7 },
      { id: 'protein', name: 'High-protein, no junk',  target: 7 },
      { id: 'read',    name: 'Read 20 pages',           target: 7 },
      { id: 'steps',   name: '8,000 steps',             target: 7 },
      { id: 'workout', name: 'Workout',                 target: 5 },
    ];

    // ===== Date helpers =====
    function getTodayIdx() {
      const d = new Date().getDay();
      return d === 0 ? 6 : d - 1; // Mon=0 … Sun=6
    }

    function getWeekKey(date = new Date()) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const mon = new Date(d);
      mon.setDate(d.getDate() + diff);
      return [mon.getFullYear(), String(mon.getMonth() + 1).padStart(2, '0'), String(mon.getDate()).padStart(2, '0')].join('-');
    }

    function getWeekLabel(weekKey) {
      const [year, month, day] = weekKey.split('-').map(Number);
      const mon = new Date(year, month - 1, day);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      if (mon.getMonth() === sun.getMonth()) {
        return `${MONTH_NAMES[mon.getMonth()]} ${mon.getDate()} – ${sun.getDate()}`;
      }
      return `${MONTH_NAMES[mon.getMonth()]} ${mon.getDate()} – ${MONTH_NAMES[sun.getMonth()]} ${sun.getDate()}`;
    }

    function gradeFor(points) {
      if (points >= 46) return { word: 'Great',   color: ACCENT.color, bg: ACCENT.bg,  msg: 'A great week. Keep it locked in.' };
      if (points >= 42) return { word: 'Solid',   color: '#b8924e',    bg: '#f7f1e5',  msg: 'Solid week — a little more for great.' };
      return                   { word: 'Rebuild', color: '#b06a52',    bg: '#f6ebe5',  msg: 'Below target. Change something this week.' };
    }

    // ===== Storage =====
    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }

    function saveState(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }

    function makeInitialState() {
      const saved = loadState();
      const weekKey = getWeekKey();

      if (saved?.weekKey === weekKey) {
        return { ...saved, tab: 'today' };
      }

      let past = saved?.past || [];
      if (saved?.weekKey) {
        const pts = (saved.habits || []).reduce((s, h) => s + (h.week || []).filter(Boolean).length, 0);
        past = [{ label: getWeekLabel(saved.weekKey), points: pts }, ...past].slice(0, 12);
      }

      return {
        weekKey,
        habits: HABITS_DEF.map(h => {
          const prev = saved?.habits?.find(sh => sh.id === h.id);
          return { ...h, week: Array(7).fill(false), streak: prev?.streak ?? 0 };
        }),
        past,
        tab: 'today',
      };
    }

    // ===== StatusBar =====
    function StatusBar() {
      const fmt = () => {
        const now = new Date();
        return `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
      };
      const [time, setTime] = useState(fmt);
      useEffect(() => {
        const id = setInterval(() => setTime(fmt()), 15000);
        return () => clearInterval(id);
      }, []);

      return (
        <div style={{ height: 54, flex: 'none', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 30px 0 34px' }}>
          <span style={{ fontWeight: 600, fontSize: 15, color: '#2c2a26', letterSpacing: '.02em' }}>{time}</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 11 }}>
              {[5, 7, 9, 11].map((h, i) => (
                <span key={i} style={{ width: 3, height: h, background: '#2c2a26', borderRadius: 1, display: 'block' }} />
              ))}
            </div>
            <div style={{ width: 22, height: 11, border: '1.4px solid #2c2a26', borderRadius: 3, position: 'relative', opacity: .9 }}>
              <span style={{ position: 'absolute', inset: 1.5, width: 13, background: '#2c2a26', borderRadius: 1, display: 'block' }} />
              <span style={{ position: 'absolute', right: -3, top: 3, width: 2, height: 5, background: '#2c2a26', borderRadius: '0 1px 1px 0', display: 'block' }} />
            </div>
          </div>
        </div>
      );
    }

    // ===== TodayTab =====
    function TodayTab({ state, today, onToggle }) {
      const weekLabel = getWeekLabel(state.weekKey);
      const todayLabel = FULL_DAY_NAMES[today];

      const points = state.habits.reduce((s, h) => s + h.week.filter(Boolean).length, 0);
      const elapsed = Math.max(1, today + 1);
      const projected = Math.round((points / elapsed) * 7);
      const g = gradeFor(projected);
      const todayDone = state.habits.filter(h => h.week[today]).length;

      const R = 78, C = 2 * Math.PI * R;
      const ringOffset = C * (1 - Math.min(points, 49) / 49);

      const markers = [42, 46].map(v => {
        const ang = (v / 49) * 2 * Math.PI - Math.PI / 2;
        return {
          x1: 100 + (R - 9) * Math.cos(ang), y1: 100 + (R - 9) * Math.sin(ang),
          x2: 100 + (R + 9) * Math.cos(ang), y2: 100 + (R + 9) * Math.sin(ang),
        };
      });

      const DONE = ACCENT.color, MISS = '#e3ddd3', FUTURE = '#efeae2';

      const dailyStatus = DAY_NAMES.map((dn, i) => {
        const pts = state.habits.reduce((s, h) => s + (h.week[i] ? 1 : 0), 0);
        const isToday = i === today;
        const isFuture = i > today;
        const pct = Math.round((pts / 7) * 100);
        return { day: dn, pts, displayPts: isFuture ? '–' : pts, isFuture, isToday, pct };
      });

      return (
        <div>
          {/* Header */}
          <div style={{ padding: '6px 22px 0', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 11, letterSpacing: '.16em', textTransform: 'uppercase', color: '#aaa399' }}>This week</div>
              <div style={{ fontWeight: 600, fontSize: 20, lineHeight: 1.2, color: '#2c2a26', marginTop: 8 }}>{weekLabel}</div>
            </div>
            <div style={{ fontWeight: 500, fontSize: 12, color: '#aaa399', paddingTop: 3 }}>{todayLabel}</div>
          </div>

          {/* Ring */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginTop: 18 }}>
            <div style={{ position: 'relative', width: 204, height: 204 }}>
              <svg width="204" height="204" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="78" fill="none" stroke="#e9e4db" strokeWidth="13" />
                {markers.map((m, i) => (
                  <line key={i} x1={m.x1} y1={m.y1} x2={m.x2} y2={m.y2} stroke="#cfc7ba" strokeWidth="2.4" strokeLinecap="round" />
                ))}
                <circle
                  cx="100" cy="100" r="78" fill="none"
                  stroke={g.color} strokeWidth="13" strokeLinecap="round"
                  strokeDasharray={C}
                  transform="rotate(-90 100 100)"
                  style={{ strokeDashoffset: ringOffset, transition: 'stroke-dashoffset .55s cubic-bezier(.4,0,.2,1), stroke .3s ease' }}
                />
              </svg>
              <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ fontWeight: 300, fontSize: 66, lineHeight: .9, color: '#2c2a26', fontVariantNumeric: 'tabular-nums' }}>{points}</div>
                <div style={{ fontWeight: 500, fontSize: 12, color: '#aaa399', marginTop: 8, letterSpacing: '.02em' }}>of 49 points</div>
              </div>
            </div>

            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginTop: 20, padding: '8px 16px', borderRadius: 999, background: g.bg }}>
              <span style={{ width: 7, height: 7, borderRadius: '50%', background: g.color, display: 'inline-block' }} />
              <span style={{ fontWeight: 600, fontSize: 13, color: g.color, letterSpacing: '.01em' }}>On pace for {g.word}</span>
            </div>
            <div style={{ fontFamily: "'Newsreader', serif", fontStyle: 'italic', fontSize: 16, color: '#7a746a', marginTop: 12, textAlign: 'center', maxWidth: 280, lineHeight: 1.45 }}>{g.msg}</div>
          </div>

          {/* Scale legend */}
          <div style={{ margin: '24px 22px 0', display: 'flex', alignItems: 'center', gap: 16, justifyContent: 'center', fontWeight: 500, fontSize: 11, color: '#aaa399' }}>
            {[
              { color: '#b06a52', label: '<42 Rebuild' },
              { color: '#b8924e', label: '42–45 Solid' },
              { color: ACCENT.color, label: '46+ Great' },
            ].map(item => (
              <span key={item.label} style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: item.color, display: 'inline-block' }} />
                {item.label}
              </span>
            ))}
          </div>

          {/* Daily points chart */}
          <div style={{ margin: '26px 22px 0', background: '#fff', border: '1px solid #ece8e1', borderRadius: 20, padding: '16px 16px 13px', boxShadow: '0 1px 2px rgba(60,52,40,.04)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <span style={{ fontWeight: 600, fontSize: 14, color: '#2c2a26' }}>Daily points</span>
              <span style={{ fontWeight: 500, fontSize: 11, color: '#aaa399' }}>out of 7 / day</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'stretch', gap: 8, height: 104 }}>
              {dailyStatus.map((d, i) => (
                <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7 }}>
                  <span style={{ fontWeight: 600, fontSize: 11, color: d.isFuture ? '#cfc7ba' : '#2c2a26', fontVariantNumeric: 'tabular-nums' }}>
                    {d.displayPts}
                  </span>
                  <div style={{ background: d.isToday ? ACCENT.bg : 'transparent', width: '100%', flex: 1, borderRadius: 8, display: 'flex', alignItems: 'flex-end', padding: 3 }}>
                    <div style={{
                      width: '100%',
                      height: d.isFuture ? '0%' : d.pct + '%',
                      minHeight: (!d.isFuture && d.pts > 0) ? 6 : 0,
                      borderRadius: 6,
                      background: ACCENT.color,
                      opacity: d.isFuture ? 0 : (d.pts === 0 ? 0 : d.pts >= 6 ? 1 : 0.5),
                      transition: 'height .45s ease',
                    }} />
                  </div>
                  <span style={{ fontWeight: d.isToday ? 700 : 500, fontSize: 10, color: d.isToday ? ACCENT.color : '#aaa399' }}>{d.day}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Today habit list */}
          <div style={{ margin: '28px 22px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span style={{ fontWeight: 600, fontSize: 14, color: '#2c2a26' }}>Today</span>
            <span style={{ fontWeight: 500, fontSize: 12, color: '#aaa399' }}>{todayDone} of 7 done</span>
          </div>

          <div style={{ margin: '12px 22px 0', background: '#fff', border: '1px solid #ece8e1', borderRadius: 20, padding: '2px 18px', boxShadow: '0 1px 2px rgba(60,52,40,.04)' }}>
            {state.habits.map((h, idx) => {
              const done = h.week[today];
              const dots = h.week.map((d, i) => {
                if (i < today)        return { bg: d ? DONE : MISS };
                if (i === today)      return { bg: d ? DONE : '#ffffff', shadow: !d ? 'inset 0 0 0 2px #cdc6bb' : undefined };
                return { bg: FUTURE };
              });

              return (
                <div key={h.id} style={{ borderTop: idx === 0 ? 'none' : '1px solid #f1ede6', padding: '15px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14 }}>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 9, flex: 1, minWidth: 0 }}>
                    <span style={{ fontWeight: 500, fontSize: 15, color: '#2c2a26', lineHeight: 1.2 }}>{h.name}</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                        {dots.map((dot, i) => (
                          <span key={i} style={{ width: 9, height: 9, borderRadius: '50%', background: dot.bg, boxShadow: dot.shadow, display: 'inline-block' }} />
                        ))}
                      </div>
                      <span style={{ color: '#d4cdc1', fontSize: 11 }}>·</span>
                      <span style={{ fontWeight: 500, fontSize: 11, color: '#aaa399' }}>
                        {h.target === 7 ? 'Daily' : `${h.target}× / week`}
                      </span>
                      {h.streak > 0 && (
                        <span style={{ fontWeight: 600, fontSize: 11, color: ACCENT.color }}>{h.streak}d streak</span>
                      )}
                    </div>
                  </div>
                  <button
                    onClick={() => onToggle(h.id)}
                    style={{
                      width: 34, height: 34, borderRadius: '50%', flexShrink: 0,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: done ? DONE : '#fff',
                      boxShadow: done ? 'none' : 'inset 0 0 0 1.7px #d8d2c8',
                      transition: 'all .2s ease',
                    }}
                  >
                    {done && (
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M5 12.5 L10 17 L19 7" stroke="#ffffff" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    )}
                  </button>
                </div>
              );
            })}
          </div>
          <div style={{ height: 8 }} />
        </div>
      );
    }

    // ===== HistoryTab =====
    function HistoryTab({ state }) {
      const weekLabel = getWeekLabel(state.weekKey);
      const today = getTodayIdx();
      const points = state.habits.reduce((s, h) => s + h.week.filter(Boolean).length, 0);
      const elapsed = Math.max(1, today + 1);
      const projected = Math.round((points / elapsed) * 7);
      const g = gradeFor(projected);
      const thisWeekPct = Math.round((points / 49) * 100);

      const past = state.past;
      const best = past.length ? Math.max(...past.map(w => w.points)) : null;
      const avg = past.length ? Math.round(past.reduce((s, w) => s + w.points, 0) / past.length) : null;
      const greatCount = past.filter(w => w.points >= 46).length;

      const ranked = [...past]
        .map(w => ({ ...w, g: gradeFor(w.points) }))
        .sort((a, b) => b.points - a.points)
        .map((w, i) => ({ ...w, rank: i + 1 }));

      return (
        <div>
          <div style={{ padding: '6px 22px 0' }}>
            <div style={{ fontWeight: 600, fontSize: 11, letterSpacing: '.16em', textTransform: 'uppercase', color: '#aaa399' }}>Leaderboard</div>
            <div style={{ fontWeight: 600, fontSize: 24, lineHeight: 1.1, color: '#2c2a26', marginTop: 9 }}>Weekly scores</div>
          </div>

          {/* This week card */}
          <div style={{ margin: '18px 22px 0', background: '#fff', border: '1px solid #ece8e1', borderRadius: 18, padding: '17px 18px', boxShadow: '0 1px 2px rgba(60,52,40,.04)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14, color: '#2c2a26' }}>This week</div>
                <div style={{ fontWeight: 500, fontSize: 11, color: '#aaa399', marginTop: 3 }}>{weekLabel} · in progress</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <span style={{ fontWeight: 300, fontSize: 30, color: '#2c2a26', fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{points}</span>
                <span style={{ fontWeight: 500, fontSize: 12, color: '#aaa399' }}> /49</span>
              </div>
            </div>
            <div style={{ marginTop: 13, height: 7, borderRadius: 999, background: '#efeae2', overflow: 'hidden' }}>
              <div style={{ height: '100%', width: thisWeekPct + '%', background: g.color, borderRadius: 999, transition: 'width .4s ease' }} />
            </div>
            <div style={{ marginTop: 12, display: 'inline-flex', alignItems: 'center', gap: 7, padding: '5px 11px', borderRadius: 999, background: g.bg }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: g.color, display: 'inline-block' }} />
              <span style={{ fontWeight: 600, fontSize: 11, color: g.color }}>On pace · {g.word}</span>
            </div>
          </div>

          {/* Stat tiles */}
          <div style={{ margin: '14px 22px 0', display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10 }}>
            {[
              { label: 'Best',    value: best ?? '–', sub: 'points' },
              { label: 'Average', value: avg  ?? '–', sub: 'points' },
              { label: 'Great',   value: greatCount,       sub: 'weeks'  },
            ].map(t => (
              <div key={t.label} style={{ background: '#fff', border: '1px solid #ece8e1', borderRadius: 16, padding: '14px 12px' }}>
                <div style={{ fontWeight: 600, fontSize: 10, letterSpacing: '.1em', textTransform: 'uppercase', color: '#aaa399' }}>{t.label}</div>
                <div style={{ marginTop: 8, fontWeight: 300, fontSize: 26, color: '#2c2a26', fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{t.value}</div>
                <div style={{ fontWeight: 500, fontSize: 11, color: '#aaa399', marginTop: 3 }}>{t.sub}</div>
              </div>
            ))}
          </div>

          {/* Ranked list */}
          {past.length > 0 ? (
            <>
              <div style={{ margin: '24px 22px 10px', fontWeight: 600, fontSize: 13, color: '#2c2a26' }}>Best weeks</div>
              <div style={{ margin: '0 22px', background: '#fff', border: '1px solid #ece8e1', borderRadius: 18, padding: '2px 16px', boxShadow: '0 1px 2px rgba(60,52,40,.04)' }}>
                {ranked.map((w, i) => {
                  let medalBg, medalColor;
                  if (w.rank === 1)     { medalBg = ACCENT.color; medalColor = '#fff'; }
                  else if (w.rank <= 3) { medalBg = ACCENT.bg; medalColor = ACCENT.color; }
                  else                  { medalBg = '#f1ede6'; medalColor = '#a8a299'; }

                  return (
                    <div key={i} style={{ borderTop: i === 0 ? 'none' : '1px solid #f1ede6', padding: '14px 0', display: 'flex', alignItems: 'center', gap: 13 }}>
                      <div style={{ width: 27, height: 27, flexShrink: 0, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600, fontSize: 13, background: medalBg, color: medalColor }}>
                        {w.rank}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                          <span style={{ fontWeight: 500, fontSize: 14, color: '#2c2a26', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{w.label}</span>
                          <span style={{ fontWeight: 600, fontSize: 14, color: '#2c2a26', fontVariantNumeric: 'tabular-nums' }}>{w.points}</span>
                        </div>
                        <div style={{ marginTop: 8, height: 6, borderRadius: 999, background: '#efeae2', overflow: 'hidden' }}>
                          <div style={{ height: '100%', width: Math.round(w.points / 49 * 100) + '%', background: w.g.color, borderRadius: 999 }} />
                        </div>
                      </div>
                      <span style={{ flexShrink: 0, padding: '4px 9px', borderRadius: 999, fontWeight: 600, fontSize: 10, background: w.g.bg, color: w.g.color }}>{w.g.word}</span>
                    </div>
                  );
                })}
              </div>
            </>
          ) : (
            <div style={{ margin: '32px 22px 0', textAlign: 'center', color: '#aaa399', fontSize: 13, fontWeight: 500, lineHeight: 1.6 }}>
              No past weeks yet.<br />Complete your first week to see history here.
            </div>
          )}
          <div style={{ height: 8 }} />
        </div>
      );
    }

    // ===== TabBar =====
    function TabBar({ tab, onToday, onHistory }) {
      const todayColor   = tab === 'today'   ? '#2c2a26' : '#bdb6aa';
      const historyColor = tab === 'history' ? '#2c2a26' : '#bdb6aa';

      return (
        <div style={{ flex: 'none', height: 78, borderTop: '1px solid #ece8e1', background: 'rgba(246,244,239,.94)', backdropFilter: 'blur(10px)', display: 'flex', paddingTop: 11 }}>
          <button onClick={onToday} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
            <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="8.2" stroke={todayColor} strokeWidth="1.7" />
              <circle cx="12" cy="12" r="2.6" fill={todayColor} />
            </svg>
            <span style={{ fontWeight: 600, fontSize: 11, color: todayColor }}>Today</span>
          </button>
          <button onClick={onHistory} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
            <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="13" width="4" height="7" rx="1.3" fill={historyColor} />
              <rect x="10" y="8" width="4" height="12" rx="1.3" fill={historyColor} />
              <rect x="16" y="4" width="4" height="16" rx="1.3" fill={historyColor} />
            </svg>
            <span style={{ fontWeight: 600, fontSize: 11, color: historyColor }}>History</span>
          </button>
        </div>
      );
    }

    // ===== App =====
    function App() {
      const [state, setState] = useState(makeInitialState);
      const today = getTodayIdx();

      useEffect(() => { saveState(state); }, [state]);

      function toggleHabit(id) {
        setState(s => ({
          ...s,
          habits: s.habits.map(h => {
            if (h.id !== id) return h;
            const week = [...h.week];
            const was = week[today];
            week[today] = !was;
            return { ...h, week, streak: Math.max(0, h.streak + (was ? -1 : 1)) };
          }),
        }));
      }

      return (
        <div style={{
          minHeight: '100vh', width: '100%', background: '#e6e3dd',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '32px 16px', fontFamily: "'Hanken Grotesk', sans-serif",
          WebkitFontSmoothing: 'antialiased',
        }}>
          <div style={{
            width: 390, height: 844, background: '#f6f4ef', borderRadius: 46,
            boxShadow: '0 30px 70px -20px rgba(60,52,40,.45), 0 0 0 1px rgba(0,0,0,.04)',
            position: 'relative', display: 'flex', flexDirection: 'column', overflow: 'hidden',
          }}>
            <StatusBar />

            <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', paddingBottom: 18, scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
              {state.tab === 'today'
                ? <TodayTab state={state} today={today} onToggle={toggleHabit} />
                : <HistoryTab state={state} />
              }
            </div>

            <TabBar
              tab={state.tab}
              onToday={() => setState(s => ({ ...s, tab: 'today' }))}
              onHistory={() => setState(s => ({ ...s, tab: 'history' }))}
            />

            <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 134, height: 5, borderRadius: 999, background: '#cfc7ba' }} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
